idea:
  title: Function Vectors for Summarization
  domain: nlp
  hypothesis: 'Function vectors, previously applied to simple tasks, can be generalized
    to more complex functions such as summarization. By doing so, it may be possible
    to decode from these function vectors the default constraints that large language
    models use in summarization.

    '
  background:
    description: 'The original function vector paper only worked on very simple tasks.
      Can we generalize to more complicated functions such as summarization? If so,
      can we decode from such function vectors what constraints LLMs by default use
      in summarization?

      '
  metadata:
